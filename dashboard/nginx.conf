server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static asset caching: hashed bundles are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Health probe used by the Helm chart in #655.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # SPA fallback: every unmatched route renders index.html so
  # client-side routing (`/time/:t`, `/strategy/:id`) works on
  # direct navigation / refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
