name: CI Checks

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pipeline:
    name: CI Pipeline
    uses: PetroSa2/petrosa-shared-workflows/.github/workflows/ci-pipeline.yml@main  # yamllint disable-line rule:line-length
    with:
      service-name: 'data-manager'
      image-name: 'yurisa2/petrosa-data-manager'
      python-version: '3.11'
      skip-docker-build: true
    secrets: inherit
